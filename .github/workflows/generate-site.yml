name: Gerar Site do Cliente
on:
  push:
    paths:
      - 'clients/**/client.json'
      - 'template-onepage/clients/**/client.json'
  workflow_dispatch:
    inputs:
      client_path:
        description: 'Caminho do client.json (ex: clients/cli_PRAl69d/client.json)'
        required: true
        default: 'clients/cli_PRAl69d/client.json'

jobs:
  generate-site:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detectar estrutura e client.json
        id: detect
        run: |
          if [ -f "package.json" ]; then
            TEMPLATE_ROOT="."
          elif [ -f "template-onepage/package.json" ]; then
            TEMPLATE_ROOT="template-onepage"
          else
            echo "ERRO: package.json não encontrado"
            exit 1
          fi
          echo "template_root=$TEMPLATE_ROOT" >> $GITHUB_OUTPUT
          echo "Template root: $TEMPLATE_ROOT"

          # Se veio de workflow_dispatch, usa o input diretamente
          if [ -n "${{ github.event.inputs.client_path }}" ]; then
            CHANGED="${{ github.event.inputs.client_path }}"
            echo "Modo: dispatch manual"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep 'client\.json' | head -1)
            if [ -z "$CHANGED" ]; then
              CHANGED=$(git show --name-only HEAD --format="" | grep 'client\.json' | head -1)
            fi
            echo "Modo: push automático"
          fi

          echo "client_path=$CHANGED" >> $GITHUB_OUTPUT
          CLIENT_ID=$(echo $CHANGED | grep -oP 'cli_[^/]+')
          echo "client_id=$CLIENT_ID" >> $GITHUB_OUTPUT
          echo "Cliente: $CLIENT_ID"
          echo "Arquivo: $CHANGED"

      - name: Instalar dependências
        run: |
          cd ${{ steps.detect.outputs.template_root }}
          npm install

      - name: Rodar geração do site via OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLIENT_PATH: ${{ steps.detect.outputs.client_path }}
          CLIENT_ID: ${{ steps.detect.outputs.client_id }}
          TEMPLATE_ROOT: ${{ steps.detect.outputs.template_root }}
        run: |
          cd ${{ steps.detect.outputs.template_root }}
          node ../.github/scripts/generate-site.js

      - name: Commit do site gerado
        run: |
          git config --global user.name "jumper-bot"
          git config --global user.email "bot@jumper.studio"
          TEMPLATE_ROOT="${{ steps.detect.outputs.template_root }}"
          CLIENT_ID="${{ steps.detect.outputs.client_id }}"
          git add "$TEMPLATE_ROOT/src/" "$TEMPLATE_ROOT/public/" 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nenhuma alteração para commitar"
          else
            git commit -m "feat: site gerado para $CLIENT_ID"
            git push
          fi
